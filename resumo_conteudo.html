<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>📚 Resumo – Inglês</title>
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #fff0f7; color: #2d2d3a; padding-bottom: 80px; }

.top-nav { background: #1a0533; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid rgba(255,255,255,0.1); }
.top-nav a { color: #f8bbd0; font-size: 0.8rem; font-weight: 700; text-decoration: none; background: rgba(124,58,237,0.25); border: 1px solid rgba(124,58,237,0.4); padding: 5px 12px; border-radius: 20px; }
.top-nav span { color: rgba(255,255,255,0.45); font-size: 0.78rem; }

.hero { background: linear-gradient(145deg, #880e4f, #e91e8c, #ff6fb7); padding: 32px 20px 24px; text-align: center; position: relative; overflow: hidden; }
.hero::after { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 70% 30%, rgba(255,255,255,0.1), transparent 60%); pointer-events: none; }
.hero-emoji { font-size: 3rem; display: block; margin-bottom: 10px; position: relative; }
.hero h1 { font-size: 1.6rem; font-weight: 900; color: white; line-height: 1.2; position: relative; }
.hero h2 { font-size: 0.95rem; color: rgba(255,255,255,0.75); font-weight: 400; margin-top: 6px; position: relative; }
.hero-pill { display: inline-block; background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.3); color: white; font-size: 0.72rem; font-weight: 700; padding: 4px 14px; border-radius: 20px; margin-top: 12px; position: relative; }

.print-btn-wrap { text-align: right; padding: 10px 16px 0; }
.print-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 16px; background: transparent; border: 1px solid rgba(124,58,237,0.35); border-radius: 20px; font-size: 0.78rem; font-family: inherit; font-weight: 600; color: rgba(124,58,237,0.6); cursor: pointer; }
.print-btn:hover { border-color: #e91e8c; color: #e91e8c; }

.nav-dots { display: flex; justify-content: center; gap: 6px; padding: 12px 10px; background: #fff0f7; border-bottom: 1px solid #e8e0f5; flex-wrap: wrap; position: sticky; top: 41px; z-index: 40; }
.nav-dot { background: none; border: 2px solid #f8bbd0; color: #e91e8c; font-size: 0.7rem; font-weight: 700; padding: 4px 10px; border-radius: 20px; cursor: pointer; white-space: nowrap; }
.nav-dot.active, .nav-dot:active { background: #e91e8c; color: white; border-color: #e91e8c; }

.section { padding: 20px 16px 8px; }
.section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.section-icon { width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; }
.s1 { background: linear-gradient(135deg,#e91e8c,#ff6fb7); }
.s2 { background: linear-gradient(135deg,#0d9488,#06b6d4); }
.s3 { background: linear-gradient(135deg,#d97706,#f59e0b); }
.s4 { background: linear-gradient(135deg,#dc2626,#f43f5e); }
.s5 { background: linear-gradient(135deg,#16a34a,#22c55e); }
.s6 { background: linear-gradient(135deg,#ec4899,#f97316); }
.s7 { background: linear-gradient(135deg,#0284c7,#38bdf8); }
.section-title { font-size: 1.05rem; font-weight: 800; color: #1e1b2e; }
.section-sub { font-size: 0.74rem; color: #9188a8; margin-top: 2px; }

.card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 12px rgba(124,58,237,0.07); border: 1px solid #fce4ec; }
.card-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #e91e8c; margin-bottom: 10px; }

.tip { background: linear-gradient(135deg,#f5f3ff,#fdf2f8); border-left: 4px solid #ff6fb7; border-radius: 0 12px 12px 0; padding: 12px 14px; margin-bottom: 12px; font-size: 0.88rem; line-height: 1.6; }
.tip .tip-title { font-size: 0.7rem; font-weight: 700; color: #ff6fb7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
.tip strong { color: #e91e8c; }

.rule-box { background: white; border: 2px solid #e91e8c; border-radius: 14px; padding: 14px; margin-bottom: 12px; }
.rule-title { font-size: 0.7rem; font-weight: 700; color: #e91e8c; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.rule-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed #fce4ec; }
.rule-row:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
.rule-tag { color: white; font-size: 0.75rem; font-weight: 800; padding: 3px 10px; border-radius: 6px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
.bg-purple { background: #e91e8c; }
.bg-teal   { background: #0d9488; }
.bg-amber  { background: #d97706; }
.bg-pink   { background: #ec4899; }
.bg-red    { background: #dc2626; }
.bg-green  { background: #16a34a; }
.bg-blue   { background: #0284c7; }
.rule-text { font-size: 0.88rem; line-height: 1.55; }
.rule-text em { color: #e91e8c; font-style: normal; font-weight: 700; }
.rule-text small { display: block; color: #9ca3af; font-size: 0.78rem; margin-top: 2px; }

.example-box { background: #faf8ff; border: 1.5px solid #fce4ec; border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; font-size: 0.88rem; line-height: 1.7; }
.example-box .ex-label { font-size: 0.68rem; font-weight: 700; color: #9188a8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.ex-correct { color: #16a34a; font-weight: 700; }
.ex-wrong   { color: #dc2626; text-decoration: line-through; }

.word-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.word-item { background: #faf8ff; border: 1.5px solid #fce4ec; border-radius: 12px; padding: 10px 12px; }
.word-item .word-main { font-size: 0.92rem; font-weight: 800; color: #e91e8c; }
.word-item .word-def  { font-size: 0.76rem; color: #6b7280; margin-top: 2px; }

.accent-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.accent-card { background: white; border: 1.5px solid #fce4ec; border-radius: 12px; padding: 12px; text-align: center; }
.accent-symbol { font-size: 2rem; font-weight: 900; margin-bottom: 4px; }
.accent-name { font-size: 0.78rem; font-weight: 800; color: #1e1b2e; margin-bottom: 4px; }
.accent-desc { font-size: 0.72rem; color: #6b7280; line-height: 1.4; }
.accent-ex   { font-size: 0.82rem; font-weight: 700; color: #e91e8c; margin-top: 6px; }

.ss-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.ss-item { background: #faf8ff; border: 1.5px solid #fce4ec; border-radius: 10px; padding: 10px; text-align: center; }
.ss-word { font-size: 0.95rem; font-weight: 800; color: #1e1b2e; }
.ss-word span { color: #ec4899; }
.ss-tip  { font-size: 0.7rem; color: #9188a8; margin-top: 3px; }

.bottom-nav { display: flex; gap: 10px; padding: 0 14px; margin: 20px 0 10px; }
.bottom-nav a { flex: 1; padding: 13px 10px; border-radius: 14px; text-decoration: none; text-align: center; font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 6px; }
.btn-home { background: rgba(124,58,237,0.12); border: 1.5px solid rgba(124,58,237,0.25); color: #e91e8c !important; }
.btn-next { background: linear-gradient(135deg,#e91e8c,#ff6fb7); color: white !important; }

.divider { height: 1px; background: #fce4ec; margin: 8px 16px 0; }
.progress-footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #fce4ec; padding: 10px 16px; display: flex; align-items: center; gap: 12px; z-index: 20; }
.pf-label { font-size: 0.75rem; font-weight: 700; color: #e91e8c; white-space: nowrap; }
.pf-bar { flex: 1; background: #fce4ec; border-radius: 10px; height: 8px; overflow: hidden; }
.pf-fill { height: 100%; background: linear-gradient(90deg,#e91e8c,#ec4899); border-radius: 10px; transition: width 0.5s; width: 0%; }
.pf-pct { font-size: 0.75rem; font-weight: 700; color: #9188a8; }
.credit { text-align: center; padding: 16px 14px 8px; font-size: 0.75rem; color: #bbb; }
.credit strong { color: #f48fb1; }

/* ── PRINT ── */
@media print {
  /* hide */
  .top-nav, .print-btn-wrap, .nav-dots, .progress-footer,
  .bottom-nav, .hero, .credit { display: none !important; }

  /* simple header */
  .print-title-header { display: block !important; }

  /* white page */
  html, body { background: white !important; color: #111 !important; font-size: 11pt; }
  body * { background-color: transparent !important; background-image: none !important;
           color: #111 !important; box-shadow: none !important; text-shadow: none !important; }

  /* sections */
  .section { padding: 10px 0 4px !important; }
  .section-header { margin-bottom: 8px !important; }
  .section-icon { width: 32px !important; height: 32px !important; font-size: 1rem !important;
    -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  .section-title { font-size: 12pt !important; font-weight: 700 !important; color: #1e1b2e !important; }
  .section-sub   { color: #555 !important; }

  /* cards */
  .card { border: 1px solid #bbb !important; border-radius: 6px !important;
          break-inside: avoid !important; page-break-inside: avoid !important;
          margin-bottom: 8px !important; padding: 10px !important; }
  .card-title { color: #880e4f !important; }

  /* rule boxes */
  .rule-box { border: 1.5px solid #555 !important; border-radius: 6px !important;
              break-inside: avoid !important; padding: 10px !important; }
  .rule-title { color: #880e4f !important; }
  .rule-tag { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important;
              font-size: 8pt !important; padding: 2px 6px !important; }
  .rule-text { font-size: 10pt !important; }
  .rule-text em { color: #880e4f !important; }
  .rule-row { border-bottom: 1px dashed #ccc !important; }

  /* tips */
  .tip { border-left: 3px solid #e91e8c !important; background: #f9f7ff !important;
         break-inside: avoid !important; padding: 8px 10px !important;
         -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  .tip strong { color: #880e4f !important; }

  /* example boxes */
  .example-box { border: 1px solid #ccc !important; border-radius: 4px !important;
                 break-inside: avoid !important; }
  .ex-correct { color: #166534 !important; }
  .ex-wrong   { color: #991b1b !important; }

  /* word grid */
  .word-grid { grid-template-columns: 1fr 1fr !important; }
  .word-item { border: 1px solid #ddd !important; border-radius: 4px !important; }
  .word-item .word-main { color: #880e4f !important; }

  /* accent grid */
  .accent-grid { grid-template-columns: 1fr 1fr !important; }
  .accent-card { border: 1px solid #ccc !important; border-radius: 4px !important; }
  .accent-ex { color: #880e4f !important; }

  /* ss grid */
  .ss-grid { grid-template-columns: repeat(3,1fr) !important; }
  .ss-item { border: 1px solid #ddd !important; border-radius: 4px !important; }
  .ss-word span { color: #9d174d !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

  /* divider */
  .divider { border-top: 1px solid #ddd !important; display: block !important; }

  /* page breaks */
  #sec1 { page-break-before: avoid !important; }
  #sec2, #sec3, #sec4, #sec5, #sec6, #sec7 { page-break-before: always !important; }
  .section { page-break-inside: avoid !important; }

  @page { margin: 1.5cm; size: A4; }
}

</style>
</head>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>📚 Estudar – Unit 2</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #fdf6ff;
  color: #2d2d3a;
  min-height: 100vh;
  padding-bottom: 40px;
}

/* ── Hero ── */
.hero {
  background: linear-gradient(145deg, #7c3aed, #a855f7, #ec4899);
  padding: 32px 20px 28px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Ccircle fill='rgba(255,255,255,0.05)' cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/svg%3E") repeat;
}
.hero-emoji { font-size: 3rem; display: block; margin-bottom: 10px; position: relative; }
.hero h1 { font-size: 1.7rem; font-weight: 900; color: white; line-height: 1.2; position: relative; }
.hero h2 { font-size: 1rem; color: rgba(255,255,255,0.8); font-weight: 400; margin-top: 6px; position: relative; }
.hero-pill {
  display: inline-block;
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.35);
  color: white;
  font-size: 0.72rem; font-weight: 700;
  padding: 4px 14px; border-radius: 20px;
  margin-top: 12px; position: relative;
  letter-spacing: 1px; text-transform: uppercase;
}

/* ── Nav dots ── */
.nav-dots {
  display: flex; justify-content: center; gap: 8px;
  padding: 14px 0 6px;
  position: sticky; top: 0; z-index: 10;
  background: #fdf6ff;
  border-bottom: 1px solid #ede9f5;
  flex-wrap: wrap;
  padding-left: 12px; padding-right: 12px;
}
.nav-dot {
  background: none; border: 2px solid #c4b5fd;
  color: #7c3aed; font-size: 0.72rem; font-weight: 700;
  padding: 5px 12px; border-radius: 20px; cursor: pointer;
  transition: all 0.2s; white-space: nowrap;
}
.nav-dot.active, .nav-dot:active {
  background: #7c3aed; color: white; border-color: #7c3aed;
}

/* ── Sections ── */
.section {
  padding: 24px 16px 8px;
}
.section-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px;
}
.section-icon {
  width: 44px; height: 44px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; flex-shrink: 0;
}
.section-icon.purple { background: linear-gradient(135deg, #7c3aed, #a855f7); }
.section-icon.pink   { background: linear-gradient(135deg, #ec4899, #f97316); }
.section-icon.teal   { background: linear-gradient(135deg, #0d9488, #06b6d4); }
.section-icon.amber  { background: linear-gradient(135deg, #d97706, #f59e0b); }
.section-icon.rose   { background: linear-gradient(135deg, #e11d48, #f43f5e); }
.section-icon.green  { background: linear-gradient(135deg, #16a34a, #22c55e); }

.section-title { font-size: 1.1rem; font-weight: 800; color: #1e1b2e; line-height: 1.2; }
.section-sub   { font-size: 0.75rem; color: #9188a8; margin-top: 2px; }

/* ── Cards ── */
.card {
  background: white;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 2px 12px rgba(124,58,237,0.07);
  border: 1px solid #ede9f5;
}

/* vocab grid */
.vocab-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-bottom: 4px;
}
.vocab-item {
  background: #faf8ff;
  border: 1.5px solid #ede9f5;
  border-radius: 12px; padding: 10px 12px;
  display: flex; flex-direction: column; gap: 2px;
  transition: transform 0.15s;
}
.vocab-item:active { transform: scale(0.97); }
.vocab-emoji { font-size: 1.6rem; line-height: 1; }
.vocab-en { font-size: 0.92rem; font-weight: 700; color: #7c3aed; }
.vocab-pt { font-size: 0.78rem; color: #6b7280; }

/* tip box */
.tip {
  background: linear-gradient(135deg, #f5f3ff, #fdf2f8);
  border-left: 4px solid #a855f7;
  border-radius: 0 12px 12px 0;
  padding: 12px 14px;
  margin-bottom: 12px;
  font-size: 0.88rem; line-height: 1.6;
}
.tip strong { color: #7c3aed; }
.tip .tip-title { font-size: 0.7rem; font-weight: 700; color: #a855f7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }

/* rule box */
.rule-box {
  background: white;
  border: 2px solid #7c3aed;
  border-radius: 14px; padding: 14px;
  margin-bottom: 12px;
}
.rule-title { font-size: 0.7rem; font-weight: 700; color: #7c3aed; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.rule-row {
  display: flex; align-items: flex-start; gap: 10px;
  margin-bottom: 10px; padding-bottom: 10px;
  border-bottom: 1px dashed #ede9f5;
}
.rule-row:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
.rule-tag {
  background: #7c3aed; color: white;
  font-size: 0.78rem; font-weight: 800;
  padding: 3px 10px; border-radius: 6px;
  white-space: nowrap; flex-shrink: 0; margin-top: 2px;
}
.rule-tag.pink  { background: #ec4899; }
.rule-tag.teal  { background: #0d9488; }
.rule-tag.amber { background: #d97706; }
.rule-tag.red   { background: #dc2626; }
.rule-text { font-size: 0.88rem; line-height: 1.55; }
.rule-text em { font-style: italic; color: #7c3aed; font-weight: 600; }
.rule-text small { display: block; color: #9ca3af; font-size: 0.78rem; margin-top: 2px; }

/* example dialogue */
.dialogue {
  background: #f8f7ff;
  border-radius: 14px; padding: 14px; margin-bottom: 12px;
}
.dialogue-title { font-size: 0.7rem; font-weight: 700; color: #9188a8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
.bubble-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-start; }
.bubble-row.right { flex-direction: row-reverse; }
.avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
.avatar.a { background: #ede9fe; }
.avatar.b { background: #fce7f3; }
.bubble {
  background: white; border: 1.5px solid #ede9f5;
  border-radius: 14px; padding: 9px 12px;
  font-size: 0.88rem; line-height: 1.5; max-width: 80%;
}
.bubble.right { background: #7c3aed; color: white; border-color: #7c3aed; }
.bubble .translation { font-size: 0.75rem; color: #9ca3af; margin-top: 3px; font-style: italic; }
.bubble.right .translation { color: rgba(255,255,255,0.7); }

/* sections of supermarket */
.sections-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.sec-card {
  background: white; border: 1.5px solid #ede9f5;
  border-radius: 12px; padding: 11px 10px; text-align: center;
}
.sec-card .sec-emoji { font-size: 1.8rem; display: block; margin-bottom: 4px; }
.sec-card .sec-name { font-size: 0.78rem; font-weight: 800; color: #7c3aed; }
.sec-card .sec-pt   { font-size: 0.7rem; color: #9ca3af; margin-top: 1px; }
.sec-card .sec-ex   { font-size: 0.68rem; color: #b0a8c8; margin-top: 3px; font-style: italic; }

/* healthy/unhealthy */
.health-split { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.health-col { border-radius: 14px; padding: 14px; }
.health-col.healthy   { background: #f0fdf4; border: 2px solid #22c55e; }
.health-col.unhealthy { background: #fff1f2; border: 2px solid #f43f5e; }
.health-col-title { font-size: 0.8rem; font-weight: 800; margin-bottom: 8px; }
.health-col.healthy   .health-col-title { color: #16a34a; }
.health-col.unhealthy .health-col-title { color: #e11d48; }
.health-item { font-size: 0.82rem; margin-bottom: 5px; color: #374151; }

/* food colors */
.colors-list { display: flex; flex-direction: column; gap: 8px; }
.color-row {
  display: flex; align-items: center; gap: 10px;
  background: white; border: 1.5px solid #ede9f5;
  border-radius: 12px; padding: 11px 13px;
}
.color-dot { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; }
.color-name { font-size: 0.85rem; font-weight: 800; min-width: 58px; }
.color-desc { font-size: 0.82rem; color: #6b7280; line-height: 1.4; }

/* numbers */
.numbers-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
.num-chip {
  background: #f5f3ff; border: 1.5px solid #c4b5fd;
  border-radius: 10px; padding: 8px 4px; text-align: center;
}
.num-chip .n { font-size: 1rem; font-weight: 900; color: #7c3aed; }
.num-chip .w { font-size: 0.58rem; color: #9188a8; margin-top: 2px; line-height: 1.3; }

/* divider */
.divider { height: 1px; background: #ede9f5; margin: 8px 16px 0; }

/* progress bar at bottom */
.progress-footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: white; border-top: 1px solid #ede9f5;
  padding: 10px 16px;
  display: flex; align-items: center; gap: 12px;
  z-index: 20;
}
.pf-label { font-size: 0.75rem; font-weight: 700; color: #7c3aed; white-space: nowrap; }

// Progress bar based on scroll
const sections = ['sec1','sec2','sec3','sec4','sec5','sec6'];
function updateProgress() {
  const scrolled = window.scrollY + window.innerHeight;
  const total = document.body.scrollHeight;
  const pct = Math.min(100, Math.round((scrolled / total) * 100));
  document.getElementById('pfFill').style.width = pct + '%';
  document.getElementById('pfPct').textContent = pct + '%';
  // also highlight active nav
  for (let i = sections.length - 1; i >= 0; i--) {
    const el = document.getElementById(sections[i]);
    if (el && window.scrollY >= el.offsetTop - 120) {
      document.querySelectorAll('.nav-dot').forEach((d,idx) => {
        d.classList.toggle('active', idx === i);
      });
      break;
    }
  }
}
window.addEventListener('scroll', updateProgress, { passive: true });
updateProgress();
